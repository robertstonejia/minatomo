<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | みんなの日中交流会</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-topbar {
            background: #065aa8;
            padding: 6px 20px;
            text-align: center;
        }
        .page-topbar a {
            color: rgba(255,255,255,0.85);
            font-size: 0.85em;
            text-decoration: none;
            font-weight: 600;
        }
        .page-header {
            background: #fff;
            padding: 20px 30px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-link {
            color: #065aa8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
            border: 1px solid #065aa8;
            padding: 6px 14px;
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .back-link:hover { background: #065aa8; color: white; }
        .page-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #065aa8;
            margin: 0;
        }
        .page-subtitle {
            font-size: 0.82em;
            color: #64748b;
            margin: 3px 0 0 0;
        }

        .contact-wrap {
            max-width: 560px;
            margin: 36px auto;
            padding: 0 20px 60px;
        }
        .contact-card {
            background: #fff;
            border: 1px solid #e0f2fe;
            border-radius: 12px;
            padding: 32px 36px;
            box-shadow: 0 2px 12px rgba(6,90,168,0.07);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.88em;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group label .required {
            color: #e53e3e;
            margin-left: 4px;
            font-size: 0.85em;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
            color: #1e293b;
            background: #f8fafc;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #065aa8;
            background: #fff;
        }
        .form-group textarea {
            height: 140px;
            resize: vertical;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #065aa8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .submit-btn:hover { background: #054a8a; }

        .success-msg {
            display: none;
            background: #ecfdf5;
            border: 1px solid #6ee7b7;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #065f46;
            font-weight: 600;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-topbar">
            <a href="/">みんなの日中交流会 トップへ</a>
        </div>

        <div class="page-header">
            <a href="/" class="back-link">← トップ</a>
            <div>
                <h1 class="page-title">お問い合わせ</h1>
                <p class="page-subtitle">ご意見・ご質問をお気軽にどうぞ / 欢迎提出意见和建议</p>
            </div>
        </div>

        <main>
            <div class="contact-wrap">
                <div class="contact-card">
                    <form id="contact-form" action="/api/contact" method="POST">
                        <div class="form-group">
                            <label>お名前 / 姓名<span class="required">*</span></label>
                            <input type="text" name="name" placeholder="例：山田 太郎" required>
                        </div>
                        <div class="form-group">
                            <label>メールアドレス / 邮箱<span class="required">*</span></label>
                            <input type="email" name="email" placeholder="例：example@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>件名 / 主题</label>
                            <input type="text" name="subject" placeholder="例：サイトについて">
                        </div>
                        <div class="form-group">
                            <label>メッセージ / 留言<span class="required">*</span></label>
                            <textarea name="message" placeholder="ご自由にお書きください" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">送信する / 提交</button>
                    </form>
                    <div class="success-msg" id="success-msg">
                        送信しました。ありがとうございます！<br>
                        <span style="font-size:0.88em;font-weight:400;color:#047857;">提交成功，感谢您的留言！</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 みんなの日中交流会</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('contact-form');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = form.querySelector('.submit-btn');
            btn.textContent = '送信中...';
            btn.disabled = true;
            try {
                const data = Object.fromEntries(new FormData(form));
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
                });
                if (res.ok) {
                    form.style.display = 'none';
                    document.getElementById('success-msg').style.display = 'block';
                } else {
                    btn.textContent = '送信する / 提交';
                    btn.disabled = false;
                    alert('送信に失敗しました。しばらく後にお試しください。');
                }
            } catch {
                btn.textContent = '送信する / 提交';
                btn.disabled = false;
                alert('送信に失敗しました。しばらく後にお試しください。');
            }
        });
    </script>
</body>
</html>
